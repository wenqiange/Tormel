version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tormel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tormel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tormel123}
      POSTGRES_DB: ${DB_NAME:-tormel_pos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tormel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tormel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional, for session management)
  redis:
    image: redis:7-alpine
    container_name: tormel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tormel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tormel-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-tormel}:${DB_PASSWORD:-tormel123}@postgres:5432/${DB_NAME:-tormel_pos}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tormel-network
    volumes:
      - backend_logs:/app/logs

  # Frontend (Nginx serving static files)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tormel-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - tormel-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  redis_data:
  backend_logs:

networks:
  tormel-network:
    driver: bridge
